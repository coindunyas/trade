name: Binance TR Signal Bot

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-signal-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run signal bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_VOLUME_TRY: ${{ vars.MIN_VOLUME_TRY || '3000000' }}
          HIGH_VOLUME_TRY: ${{ vars.HIGH_VOLUME_TRY || '20000000' }}
          SIGNAL_COOLDOWN_HOURS: ${{ vars.SIGNAL_COOLDOWN_HOURS || '2' }}
        run: PYTHONPATH=src python -m crypto_signal_bot.main
